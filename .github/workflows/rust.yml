name: Rust

on: [push, pull_request, merge_group]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
            os: ubuntu-latest
          - rust: stable
            os: macos-latest
          - rust: stable
            os: windows-latest
          - rust: beta
            os: ubuntu-latest
          - rust: nightly
            os: ubuntu-latest
          - rust: "1.85"
            os: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --all --verbose

      - name: Clippy
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo clippy --all-targets --all-features

      - name: Format
        if: matrix.rust == 'stable' && matrix.os == 'ubuntu-latest'
        run: cargo fmt -- --check

  features:
    name: features (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: default
            features: ""
          - label: datetime_serialize_rfc3339
            features: datetime_serialize_rfc3339

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Test with features
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            cargo test --all --verbose
          else
            cargo test --all --verbose --features "${{ matrix.features }}"
          fi

  no_std:
    name: no_std
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi

      - uses: Swatinem/rust-cache@v2

      - name: Build library (host, #![no_std])
        run: cargo build --lib --verbose

      - name: Chrono must stay alloc+serde only
        run: |
          tree="$(cargo tree -p chrono -f '{p} {f}' | head -1)"
          echo "$tree"
          echo "$tree" | grep -q 'alloc'
          echo "$tree" | grep -q 'serde'
          if echo "$tree" | grep -qE '(^|[, ])std([, ]|$)'; then
            echo "chrono unexpectedly enables std" >&2
            exit 1
          fi
          if echo "$tree" | grep -qE '(^|[, ])clock([, ]|$)'; then
            echo "chrono unexpectedly enables clock" >&2
            exit 1
          fi

      - name: Freestanding thumbv7em-none-eabi
        run: cargo build --lib --target thumbv7em-none-eabi --verbose
